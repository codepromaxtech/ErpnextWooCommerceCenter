<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="bgShine" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#bgShine)"/>

  <!-- Circular sync arrows -->
  <g fill="none" stroke="#fff" stroke-opacity="0.92" stroke-width="18" stroke-linecap="round">
    <!-- Top-right arc (clockwise) -->
    <path d="M 338,138 A 120,120 0 0,1 374,310"/>
    <!-- Arrow head -->
    <polygon points="374,310 392,282 362,278" fill="#fff" fill-opacity="0.92" stroke="none"/>

    <!-- Bottom-left arc (counter-clockwise) -->
    <path d="M 174,374 A 120,120 0 0,1 138,202"/>
    <!-- Arrow head -->
    <polygon points="138,202 120,230 150,234" fill="#fff" fill-opacity="0.92" stroke="none"/>
  </g>

  <!-- Shopping bag -->
  <g transform="translate(256,264)" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bag body (tapered rectangle) -->
    <path d="M-72,20 L-58,-52 L58,-52 L72,20 Q72,40 52,40 L-52,40 Q-72,40 -72,20 Z"
          fill="rgba(255,255,255,0.12)" stroke="#fff" stroke-width="16"/>
    <!-- Bag handle -->
    <path d="M-28,-52 L-28,-76 Q-28,-100 0,-100 Q28,-100 28,-76 L28,-52"
          fill="none" stroke="#fff" stroke-width="16"/>
    <!-- Horizontal line details inside bag -->
    <line x1="-36" y1="-22" x2="36" y2="-22" stroke="rgba(255,255,255,0.5)" stroke-width="8"/>
    <line x1="-28" y1="2" x2="28" y2="2" stroke="rgba(255,255,255,0.5)" stroke-width="8"/>
  </g>
</svg>
